services:
  dashboard:
    build: .
    container_name: sysadmin-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    # IMPORTANT: Si REDIS_PASSWORD est défini dans .env,
    # REDIS_URL doit inclure le password : redis://:PASSWORD@redis:6379
    volumes:
      - ./data:/app/data
    networks:
      - dashboard
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - dashboard
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sp-webapp:
    image: nginx:alpine
    container_name: sp-webapp
    restart: unless-stopped
    volumes:
      - ./sp-webapp/index.html:/usr/share/nginx/html/index.html:ro
      - ./sp-webapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dashboard
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: dashboard-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - dashboard

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  dashboard:
    driver: bridge
