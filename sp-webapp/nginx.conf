server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # Security headers (defense-in-depth, meme si Caddy les ajoute aussi)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA: toute route → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ne pas mettre en cache index.html ni config.json (mises à jour immédiates)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache long sur assets statiques éventuels
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check pour docker
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }
}
